name: Build Android Production App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Generate APK and AAB Packages
    runs-on: ubuntu-latest

    steps:
    # 1. جلب الأكواد الحديثة والأيقونة الرسمية النظيفة من المستودع
    - name: Checkout Source Code
      uses: actions/checkout@v4

    # 2. إعداد بيئة جافا الحديثة والمستقرة (JDK 21)
    - name: Set up Java Development Kit (JDK 21)
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'zulu'

    # 3. إعداد بيئة Node.js حديثة وتفعيل كاش npm تلقائياً لتجنب تعارضات ملفات القفل
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    # 4. تنظيف الحزم القديمة تماماً وتثبيت المكتبات بشكل نقي ومتوافق مع السيرفر
    - name: Install Project Dependencies
      run: |
        rm -rf node_modules package-lock.json
        npm install --legacy-peer-deps

    # 5. بناء كود الويب المحدث لضمان دمج آخر التعديلات
    - name: Build Web Application
      run: |
        npm run build --if-present

    # 6. مزامنة ونقل كود الويب والأيقونات الحديثة إلى منصة الأندرويد
    - name: Sync Capacitor to Android Platform
      run: |
        npx cap sync android

    # 7. تطبيق الإعدادات المتوافقة وسحق الملفات المتكررة والتالفة تلقائياً
    - name: Enforce Compatible Configuration and Fix Source Code
      run: |
        # فرض إصدارات مكتبة أندرويد المستقرة لتجنب تعارضات كاباسيتور
        cat << 'EOF' >> android/build.gradle
        subprojects {
            configurations.all {
                resolutionStrategy.force 'androidx.core:core-ktx:1.13.1'
                resolutionStrategy.force 'androidx.core:core:1.13.1'
            }
        }
        EOF
        
        # تحديث قيمة minSdkVersion لتتوافق مع المعايير الحديثة
        if [ -f android/variables.gradle ]; then
          sed -i 's/minSdkVersion = .*/minSdkVersion = 24/g' android/variables.gradle
        fi
        sed -i 's/minSdkVersion .*/minSdkVersion 24/g' android/app/build.gradle
        
        # تعديل صلاحية دالة onStart في كلاس MainActivity لتصبح public منعاً لانهيار التجميع
        MAIN_ACTIVITY_PATH="android/app/src/main/java/com/zoon/agri/app/MainActivity.java"
        if [ -f "$MAIN_ACTIVITY_PATH" ]; then
          sed -i 's/protected void onStart()/public void onStart()/g' "$MAIN_ACTIVITY_PATH"
        fi

        # إزالة ملفات الخلفية المتجهة المسببة للمشاكل لتأمين اعتماد النظام على أيقونات الـ PNG الرسمية
        rm -f android/app/src/main/res/values/ic_launcher_background.xml
        rm -f android/app/src/main/res/drawable/ic_launcher_background.xml

    # 8. خطوة الترميم وتعميم الأيقونة الحقيقية بدقتها الكاملة على كل المقاسات
    - name: Reconstruct and Enforce Real Application Icon
      run: |
        echo "Installing ImageMagick system utilities..."
        sudo apt-get update && sudo apt-get install -y imagemagick
        
        echo "Locating the master high-resolution icon..."
        MASTER_ICON="android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png"
        
        if [ ! -f "$MASTER_ICON" ]; then
          MASTER_ICON=$(find android/app/src/main/res/mipmap-* -name "ic_launcher.png" | head -n 1)
        fi
        
        if [ -f "$MASTER_ICON" ]; then
          echo "Master Icon Detected Successfully at: $MASTER_ICON"
          convert "$MASTER_ICON" -strip png24:master_clean.png
        else
          echo "Critical Warning: Master icon not found in repository. Using backup canvas."
          convert -size 512x512 xc:"#1B5E20" -strip png24:master_clean.png
        fi

        deploy_icon_dimension() {
          local folder_name="$1"
          local dimension="$2"
          
          local target_dir="android/app/src/main/res/$folder_name"
          mkdir -p "$target_dir"
          
          echo "Deploying real design into $folder_name (${dimension}x${dimension})..."
          convert master_clean.png -resize ${dimension}x${dimension} -strip png24:"$target_dir/ic_launcher.png"
          convert master_clean.png -resize ${dimension}x${dimension} -strip png24:"$target_dir/ic_launcher_round.png"
          convert master_clean.png -resize ${dimension}x${dimension} -strip png24:"$target_dir/ic_launcher_foreground.png"
          
          chmod 664 "$target_dir"/ic_launcher*.png
        }

        deploy_icon_dimension "mipmap-mdpi" 48
        deploy_icon_dimension "mipmap-hdpi" 72
        deploy_icon_dimension "mipmap-xhdpi" 96
        deploy_icon_dimension "mipmap-xxhdpi" 144
        deploy_icon_dimension "mipmap-xxxhdpi" 192
        
        find android/app/src/main/res/ -name "splash.png" | while read -r splash; do
          if [ -f "$splash" ]; then
            convert "$splash" -strip png24:temp_splash.png 2>/dev/null || true
            if [ -s temp_splash.png ]; then
              rm -f "$splash"
              mv temp_splash.png "$splash"
              chmod 664 "$splash"
            else
              rm -f temp_splash.png
            fi
          fi
        done

        rm -f master_clean.png
        echo "android.crunchPngs=false" >> android/gradle.properties

    # 9. إعداد أداة Gradle المركزية بالنسخة 8.4 المستقرة
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.4'

    # 10. تنظيف الكاش كلياً لبناء نظيف من الصفر بالأيقونات الحقيقية الموزعة
    - name: Clean Android Build Cache
      run: gradle clean
      working-directory: ./android

    # 11. بناء وتجميع ملف الـ APK النظيف بالأيقونة المحدثة والكاملة
    - name: Compile and Build APK
      run: gradle assembleDebug
      working-directory: ./android

    # 12. بناء وتجميع حزمة الـ AAB (App Bundle) الرسمية لرفعها للمتجر
    - name: Compile and Build App Bundle (AAB)
      run: gradle bundleRelease
      working-directory: ./android

    # 13. استخراج وحفظ ملف الـ APK في الـ Artifacts للتحميل والتجربة
    - name: Archive and Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: GoogleStudio-App-Debug-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7

    # 14. استخراج وحفظ ملف الـ AAB في الـ Artifacts للرفع للمتجر
    - name: Archive and Upload AAB
      uses: actions/upload-artifact@v4
      with:
        name: GoogleStudio-App-Production-AAB
        path: android/app/build/outputs/bundle/release/app-release*.aab
        retention-days: 7
